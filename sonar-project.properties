# ── Identificación del proyecto ──────────────────────────────
sonar.organization=gabrielgarciatoriz
sonar.projectKey=GabrielGarciaToriz_GGarciaBancoFrontend
sonar.projectName=GGarciaBancoFrontend
sonar.projectVersion=1.0

# ── Conexión a SonarCloud ─────────────────────────────────────
sonar.host.url=https://sonarcloud.io

# ── Fuentes ───────────────────────────────────────────────────
