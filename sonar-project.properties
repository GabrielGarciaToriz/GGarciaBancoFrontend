sonar.javascript.lcov.reportPaths=coverage/GGarciaBancoFrontend/lcov.info
#sonar.testExecutionReportPaths=reports/test-report.xml

# ── Encoding ──────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8